<h2>Why Strength Training Matters After 65</h2>
     7|<p>After age 30, we lose 3-5% of muscle mass per decade. That accelerates after 65. Strength training is the single most effective intervention to slow and even reverse this process. Stronger muscles mean better balance, easier daily tasks, and a lower risk of falls and fractures.</p>
     8|<div class="tip-box"><strong>Key Stat:</strong> Adults 65+ who do strength training 2x per week reduce their risk of falling by 34% and improve their ability to perform daily activities significantly. (CDC)</div>
     9|
    10|<h2>Beginner Strength Routine (All Exercises Can Be Done Seated)</h2>
    11|<h3>1. Seated Shoulder Press</h3>
    12|<p>Hold light dumbbells (1-3 lbs) or water bottles at shoulder height. Press overhead until arms are straight but not locked. Lower slowly. 10 reps.</p>
    13|<h3>2. Seated Rows</h3>
    14|<p>Sit upright. Pull elbows back as if rowing, squeezing shoulder blades together. Use a resistance band or just your bodyweight. 10-12 reps.</p>
    15|<h3>3. Chair Squats</h3>
    16|<p>Stand in front of a sturdy chair. Lower yourself slowly until you barely touch the seat, then stand back up. Use your arms for balance. 8-10 reps.</p>
    17|<h3>4. Standing Calf Raises</h3>
    18|<p>Hold the back of a chair. Slowly rise onto your tiptoes, hold for 2 seconds, and lower. 10-12 reps. Builds ankle stability and walking endurance.</p>
    19|<h3>5. Wall Push-Ups</h3>
    20|<p>Stand arm's length from a wall. Place hands on the wall at shoulder height and width. Slowly lower your chest to the wall, then push back. 10-12 reps.</p>
    21|
    22|<h2>Program Guide</h2>
    23|<ul>
    24|<li><strong>Frequency:</strong> 2-3 times per week, non-consecutive days</li>
    25|<li><strong>Sets:</strong> 1-2 sets per exercise</li>
    26|<li><strong>Reps:</strong> 8-12 reps (you should feel effort by rep 10)</li>
    27|<li><strong>Rest:</strong> 60-90 seconds between exercises</li>
    28|<li><strong>Progression:</strong> Add 1 rep or 1 set when exercise feels easy</li>
    29|</ul>
    30|<div class="tip-box"><strong>Remember:</strong> Start light and focus on form. Quality over quantity. Combine with our <a href="/resistance-bands-seniors.html">resistance band routine</a> for a complete program.</div>
