     6|<h2>Nutrition Changes After 65</h2>
     7|<p>As we age, our bodies absorb fewer nutrients, appetite can decline, and hydration becomes more critical. Eating well is one of the most powerful tools for maintaining energy, brain function, and independence.</p>
     8|
     9|<h2>Key Nutrients for Healthy Aging</h2>
    10|<h3>Protein — The Muscle Builder</h3>
    11|<p>Aim for 20-30g of protein per meal. Good sources: eggs, Greek yogurt, cottage cheese, fish, chicken, lentils, and tofu. Protein helps preserve muscle mass alongside your strength training.</p>
    12|<h3>Calcium & Vitamin D — Bone Protectors</h3>
    13|<p>Adults 65+ need 1200mg of calcium daily. Dairy, fortified plant milks, leafy greens, and sardines are excellent sources. Vitamin D helps calcium absorption — get 15 minutes of sunlight daily or consider a D3 supplement.</p>
    14|<h3>Omega-3s — Brain & Heart Fuel</h3>
    15|<p>Fatty fish (salmon, mackerel, sardines), walnuts, flaxseeds, and chia seeds support brain health and reduce inflammation. Aim for 2 servings of fatty fish per week.</p>
    16|<h3>Fiber — Digestion & Heart Health</h3>
    17|<p>Oats, beans, lentils, berries, apples, and vegetables. Fiber supports regular digestion, helps manage blood sugar, and lowers cholesterol.</p>
    18|<h3>B12 — Energy & Nerves</h3>
    19|<p>Many older adults struggle to absorb B12 from food. Fortified cereals, nutritional yeast, or a B12 supplement can help maintain energy and nerve function.</p>
    20|
    21|<h2>Simple Healthy Eating Habits</h2>
    22|<ul>
    23|<li>Drink water throughout the day — thirst sensation decreases with age</li>
    24|<li>Eat colorful vegetables at every meal</li>
    25|<li>Include protein at breakfast (eggs, yogurt, or a smoothie with protein powder)</li>
    26|<li>Limit processed foods and added sugar</li>
    27|<li>Eat with others when possible — social eating improves appetite</li>
    28|</ul>
    29|<div class="tip-box"><strong>Hydration Tip:</strong> Keep a water bottle next to your favorite chair. Add lemon, cucumber, or berries for flavor. Aim for 6-8 glasses daily.</div>
