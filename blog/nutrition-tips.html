     4|<section class="page-header"><div class="container"><h1>7 Nutrition Tips for Healthy Aging</h1><p>Simple, practical eating advice for energy, brain health, and longevity — starting today.</p></div></section>
     5|<div class="featured-img" style="margin-top: 1.5rem; margin-bottom: 0;">
     6|    <img src="https://picsum.photos/seed/senior-healthy-eating/800/400" alt="Healthy nutritious foods for senior wellness and healthy aging">
     7|  </div>
     8|<section class="content"><div class="container">
     9|<p>Good nutrition is one of your most powerful tools for healthy aging. These 7 practical tips will help you eat well for energy, brain health, and longevity.</p>
    10|<ul>
    11|<li><strong>Eat enough protein</strong> — 20-30g per meal. Eggs, yogurt, fish, chicken, lentils, tofu. Preserves muscle mass.</li>
    12|<li><strong>Prioritize calcium & vitamin D</strong> — 1200mg calcium daily. Dairy, greens, fortified foods. Vitamin D from sunlight or supplements.</li>
    13|<li><strong>Include omega-3s</strong> — Salmon, walnuts, flaxseeds. Supports brain health and reduces inflammation.</li>
    14|<li><strong>Get plenty of fiber</strong> — Oats, beans, berries, vegetables. Supports digestion, blood sugar, and heart health.</li>
    15|<li><strong>Stay hydrated</strong> — 6-8 glasses of water daily. Thirst decreases with age. Add lemon or fruit for flavor.</li>
    16|<li><strong>Consider B12</strong> — Many seniors have trouble absorbing B12 from food. Fortified cereals or supplements can help.</li>
    17|<li><strong>Eat with others</strong> — Social eating improves appetite and enjoyment. Share meals with family or community.</li>
    18|</ul>
    19|<div class="tip-box"><strong>Weekly Goal:</strong> Add one colorful vegetable to every meal. Include protein at breakfast. Drink a glass of water with each meal.</div>
