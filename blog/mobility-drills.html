     4|<section class="page-header"><div class="container"><h1>5 Best Mobility Drills for Seniors</h1><p>Simple daily exercises to improve balance, flexibility, and confidence — no equipment needed.</p></div></section>
     5|<div class="featured-img">
     6|  <img src="https://images.unsplash.com/photo-1540497077202-7c8a3999166f?w=800&q=80&fit=crop" alt="Senior doing gentle mobility exercises in living room setting">
     7|</div>
     8|<section class="content"><div class="container">
     9|<p>Mobility is the foundation of independence. These 5 drills require no equipment and can be done from your living room. Spend 10-15 minutes daily to see real improvements in balance, flexibility, and confidence.</p>
    10|<ol>
    11|<li><strong>Ankle Circles</strong> — While seated, lift one foot and rotate your ankle 10 times each direction. Improves ankle flexibility and prevents tripping.</li>
    12|<li><strong>Seated Knee Lifts</strong> — Sit upright, lift one knee toward your chest, lower, repeat with the other. 10 per side. Builds hip mobility.</li>
    13|<li><strong>Standing March (with support)</strong> — Hold a sturdy chair. March in place slowly. 10-20 steps. Great for balance.</li>
    14|<li><strong>Heel-to-Toe Walk</strong> — Walk 10 steps with heel touching toes. Use a counter for balance. Classic fall prevention drill.</li>
    15|<li><strong>Side Leg Raises</strong> — Hold a chair. Lift one leg sideways, lower slowly. 8-10 per side. Strengthens hips.</li>
    16|</ol>
