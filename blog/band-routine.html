     4|<section class="page-header"><div class="container"><h1>Simple Resistance Band Routine for Seniors</h1><p class="meta">May 13, 2026 — 4 min read</p></div></section>
  <div class="featured-img" style="margin: 1.5rem 0; border-radius: 10px; overflow: hidden;">
    <img src="https://picsum.photos/seed/567/800/400" alt="Senior using resistance bands for strength training at home" style="width: 100%; height: auto; display: block; border-radius: 10px; aspect-ratio: 2/1; object-fit: cover;">

     5|<section class="content"><div class="container">
     6|<p>Resistance bands are one of the safest ways to build strength after 65. This 5-exercise routine works your whole body without stressing your joints.</p>
     7|<ol>
     8|<li><strong>Banded Chair Row</strong> — Loop band around feet, pull toward chest. 10-12 reps. Targets upper back and posture.</li>
     9|<li><strong>Seated Leg Press</strong> — Loop band around soles, push legs out. 10-12 reps. Strengthens legs.</li>
    10|<li><strong>Banded Bicep Curls</strong> — Stand on band, curl hands to shoulders. 10-12 reps.</li>
    11|<li><strong>Standing Hip Abduction</strong> — Band around ankles, lift leg sideways. 8-10 reps per side.</li>
    12|<li><strong>Banded Overhead Press</strong> — Stand on band, press overhead. 8-10 reps.</li>
    13|</ol>
    14|<div class="tip-box"><strong>Start Light:</strong> Use a light resistance band (yellow/red). 1-2 sets, 10 reps. Rest 60s between exercises. Do 2-3x per week.</div>
